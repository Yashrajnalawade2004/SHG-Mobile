name: Deploy Dev

on:
  push:
    branches:
      - dev

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Expo Web
        run: npm run build:web

      - name: Build Express Server
        run: npm run server:build

      - name: Verify Build
        run: |
          ls -la
          ls -la web-build
          ls -la server_dist
